# =============================================================================
# Nginx Configuration for Image Inpainter (Vue SPA + Flask Backend)
# =============================================================================
# IMPORTANT: Adjust the `root` path below to match your system's frontend
# dist directory location before using this config.
#   Example (Linux):   root /home/user/project/frontend/dist;
#   Example (macOS):   root /Users/user/project/frontend/dist;
#   Example (Windows): root D:/python项目/第一个/frontend/dist;
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # Vue SPA static files
        root D:/python项目/第一个/frontend/dist;
        index index.html;

        # API proxy to Flask backend
        location /api/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Uploaded files proxy to Flask backend
        location /uploads/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vue SPA fallback - all other routes go to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
